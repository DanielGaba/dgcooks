<!DOCTYPE html>
<html lang="ru" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DGCooks — Главная</title>
    <style>
        :root {
            --bg-color: #fcfaf7;
            --text-color: #332d29;
            --accent-color: #bc6c25;
            --accent-light: #dda15e;
            --card-bg: #ffffff;
            --border-color: #e6dfd5;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .welcome-container {
            max-width: 650px;
            width: 100%;
            background: var(--card-bg);
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            text-align: center;
            border: 1px solid var(--border-color);
        }

        .lang-bar {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 35px;
            font-size: 13px;
        }

        .lang-bar a {
            text-decoration: none;
            color: var(--text-color);
            font-weight: bold;
            padding: 5px 10px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            transition: all 0.2s ease;
        }

        .lang-bar a.active {
            background: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
        }

        .lang-bar a:hover:not(.active) {
            border-color: var(--accent-color);
            background: #fffdfa;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 8px;
            color: var(--text-color);
        }

        .subtitle {
            color: #666;
            margin-bottom: 35px;
            font-size: 16px;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        @media (max-width: 480px) {
            .menu-grid {
                grid-template-columns: 1fr;
            }
        }

        .menu-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: white;
            border: 2px solid var(--border-color);
            padding: 18px 20px;
            border-radius: 12px;
            text-decoration: none;
            color: var(--text-color);
            font-weight: 600;
            font-size: 15px;
            transition: all 0.2s ease;
            text-align: left;
        }

        .menu-btn:hover {
            border-color: var(--accent-color);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(188, 108, 37, 0.08);
        }

        .menu-btn span.arrow {
            color: var(--accent-light);
            font-size: 16px;
            transition: transform 0.2s;
        }

        .menu-btn:hover span.arrow {
            transform: translateX(3px);
        }

        .menu-btn.history-btn {
            grid-column: span 2;
            border-color: var(--accent-light);
            background: #fffdfa;
        }
        @media (max-width: 480px) {
            .menu-btn.history-btn { grid-column: span 1; }
        }

        .random-btn {
            background: linear-gradient(135deg, var(--accent-color), #d4a373);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 18px;
            width: 100%;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(188, 108, 37, 0.2);
            transition: all 0.2s;
        }

        .random-btn:hover {
            transform: scale(1.01);
            box-shadow: 0 6px 20px rgba(188, 108, 37, 0.3);
        }
    </style>
</head>
<body>

<div class="welcome-container">
    <div class="lang-bar">
        <a href="index.html" class="active">RU</a>
        <a href="ua-index.html">UA</a>
        <a href="en-index.html">EN</a>
        <a href="he-index.html">HE</a>
    </div>

    <h1>👨‍🍳 DGCooks</h1>
    <p class="subtitle">Семейная книга проверенных рецептов</p>

    <div class="menu-grid">
        <a href="bakery.html" class="menu-btn">
            <span>🥖 Выпечка и Хлеб</span>
            <span class="arrow">→</span>
        </a>
        <a href="salads.html" class="menu-btn">
            <span>🥗 Салаты</span>
            <span class="arrow">→</span>
        </a>
        <a href="main-dishes.html" class="menu-btn">
            <span>🥩 Горячие блюда</span>
            <span class="arrow">→</span>
        </a>
        <a href="soups.html" class="menu-btn">
            <span>🍲 Супы</span>
            <span class="arrow">→</span>
        </a>
        <a href="breakfasts.html" class="menu-btn">
            <span>🍳 Завтраки</span>
            <span class="arrow">→</span>
        </a>
        <a href="desserts.html" class="menu-btn">
            <span>🍰 Десерты</span>
            <span class="arrow">→</span>
        </a>
        <a href="snacks.html" class="menu-btn">
            <span>🧆 Закуски и Соусы</span>
            <span class="arrow">→</span>
        </a>
        <a href="history.html" class="menu-btn history-btn">
            <span>📖 История и Культура еды</span>
            <span class="arrow">✨</span>
        </a>
    </div>

    <button class="random-btn" onclick="alert('🎲 Roulette animation coming soon in Task 4.4!')">
        🎲 Шеф, удиви меня!
    </button>
</div>

</body>
</html>
